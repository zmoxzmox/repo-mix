name: Publish Tip

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      commit:
        description: Commit SHA on protected main to publish as tip
        required: false
        type: string

concurrency:
  group: main-tip-channel
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  setup:
    name: Resolve Tip Commit
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: macos-26
    outputs:
      commit: ${{ steps.tip.outputs.commit }}
      short-sha: ${{ steps.tip.outputs.short-sha }}
      build-number: ${{ steps.tip.outputs.build-number }}
      tag: ${{ steps.tip.outputs.tag }}
      tooling-commit: ${{ steps.tip.outputs.tooling-commit }}
      should-publish: ${{ steps.tip.outputs.should-publish }}
    steps:
      - name: Check out trusted tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve protected main commit
        id: tip
        env:
          REQUESTED_COMMIT: ${{ inputs.commit || github.event.workflow_run.head_sha }}
          TIP_UPDATE_REPOSITORY: ${{ vars.TIP_UPDATE_REPOSITORY || 'repoprompt/repoprompt-ce-tip-updates' }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          commit="${REQUESTED_COMMIT:-$(git rev-parse origin/main)}"
          commit="$(git rev-parse "$commit^{commit}")"
          git merge-base --is-ancestor "$commit" origin/main || {
            echo "Requested tip commit is not reachable from origin/main" >&2
            exit 1
          }
          short_sha="$(git rev-parse --short=12 "$commit")"
          build_sequence="$(git rev-list --count "$commit")"
          (( build_sequence <= 9999 )) || {
            echo "Tip build sequence exceeds the three-component CFBundleVersion capacity" >&2
            exit 1
          }

          stable_appcast="$RUNNER_TEMP/stable-appcast.xml"
          curl --fail --location --retry 3 --silent --show-error \
            https://github.com/repoprompt/repoprompt-ce-updates/releases/latest/download/appcast.xml \
            --output "$stable_appcast"
          stable_build_number="$(python3 - "$stable_appcast" <<'PYTHON'
          import sys
          import xml.etree.ElementTree as ET

          root = ET.parse(sys.argv[1]).getroot()
          versions = [
              (element.text or "").strip()
              for element in root.iter()
              if element.tag.rsplit("}", 1)[-1] == "version"
          ]
          if len(versions) != 1 or not versions[0].isdigit():
              raise SystemExit("Stable appcast must contain exactly one numeric sparkle:version")
          print(versions[0])
          PYTHON
          )"
          (( ${#stable_build_number} <= 4 )) || {
            echo "Stable build number exceeds CFBundleVersion's four-digit major component" >&2
            exit 1
          }
          build_number="$stable_build_number.$((build_sequence / 100)).$((build_sequence % 100))"
          archive_basename="RepoPrompt-tip-$short_sha-$build_number"
          tag="tip-$short_sha"

          lookup_classification="$(./Scripts/lookup_public_tip_release.sh \
            "$TIP_UPDATE_REPOSITORY" \
            "$tag" \
            "$archive_basename")"
          case "$lookup_classification" in
            found)
              should_publish=false
              echo "Existing tip release response classification=complete; skipping rebuild."
              ;;
            not-found)
              should_publish=true
              ;;
            *)
              echo "GitHub public tip lookup classification=unexpected-helper-output" >&2
              exit 1
              ;;
          esac
          {
            echo "commit=$commit"
            echo "short-sha=$short_sha"
            echo "build-number=$build_number"
            echo "tag=$tag"
            echo "tooling-commit=$(git rev-parse HEAD)"
            echo "should-publish=$should_publish"
          } >> "$GITHUB_OUTPUT"

  stage:
    name: Build Tip Source Without Secrets
    needs: setup
    if: needs.setup.outputs.should-publish == 'true'
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - name: Check out trusted tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.setup.outputs.tooling-commit }}
          path: trusted-control-plane
          fetch-depth: 0
          persist-credentials: false

      - name: Check out tip source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.setup.outputs.commit }}
          path: tip-source
          fetch-depth: 0
          persist-credentials: false

      - name: Stage tip artifact
        env:
          TIP_COMMIT: ${{ needs.setup.outputs.commit }}
          TIP_SHORT_SHA: ${{ needs.setup.outputs.short-sha }}
          TIP_BUILD_NUMBER: ${{ needs.setup.outputs.build-number }}
          TIP_TAG: ${{ needs.setup.outputs.tag }}
          REPOPROMPT_CONTROL_PLANE_SCRIPTS_DIR: ${{ github.workspace }}/trusted-control-plane/Scripts
          REPOPROMPT_RELEASE_SOURCE_ROOT: ${{ github.workspace }}/tip-source
          # Link Sentry and preserve dSYMs without exposing DSN or auth in this stage.
          REPOPROMPT_ENABLE_SENTRY: "1"
        run: ./trusted-control-plane/Scripts/main_tip_release.sh stage

      - name: Upload staged tip source
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: RepoPrompt-CE-staged-tip
          path: |
            tip-source/dist/*-stage.zip
            tip-source/dist/*-stage.zip.sha256
          if-no-files-found: error
          retention-days: 1

  sign:
    name: Sign and Notarize Tip
    needs:
      - setup
      - stage
    environment: tip-release
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - name: Check out trusted tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.setup.outputs.tooling-commit }}
          path: trusted-control-plane
          fetch-depth: 0
          persist-credentials: false

      - name: Download staged tip source
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: RepoPrompt-CE-staged-tip
          path: staged-tip

      - name: Check out approved tip source as data
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.setup.outputs.commit }}
          path: approved-source
          fetch-depth: 1
          persist-credentials: false

      - name: Verify and expand staged tip source
        env:
          RELEASE_COMMIT: ${{ needs.setup.outputs.commit }}
          REPOPROMPT_RELEASE_BUILD_NUMBER_OVERRIDE: ${{ needs.setup.outputs.build-number }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          archives=(staged-tip/*-stage.zip)
          checksums=(staged-tip/*-stage.zip.sha256)
          [[ "${#archives[@]}" == "1" ]] || { echo "Expected one staged tip ZIP" >&2; exit 1; }
          [[ "${#checksums[@]}" == "1" ]] || { echo "Expected one staged tip checksum" >&2; exit 1; }
          [[ "${checksums[0]}" == "${archives[0]}.sha256" ]] || { echo "Staged tip checksum name mismatch" >&2; exit 1; }
          (cd staged-tip && shasum -a 256 -c "$(basename "${checksums[0]}")")
          ./trusted-control-plane/Scripts/extract_staged_release.py "${archives[0]}" tip-source RepoPrompt
          REPOPROMPT_RELEASE_SOURCE_ROOT=tip-source \
            REPOPROMPT_APPROVED_SOURCE_ROOT=approved-source \
            ./trusted-control-plane/Scripts/validate_staged_release.sh

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          CERTIFICATE_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
          CI_KEYCHAIN_PASSWORD: ${{ secrets.CI_KEYCHAIN_PASSWORD }}
          CONFIGURED_SIGN_IDENTITY: ${{ vars.SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          umask 077
          KEYCHAIN_PATH="$RUNNER_TEMP/repoprompt-tip.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/repoprompt-tip.p12"
          printf '%s' "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$CI_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$CI_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$CI_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "SIGN_IDENTITY=${CONFIGURED_SIGN_IDENTITY:-Developer ID Application: Eric Provencher (648A27MST5)}" >> "$GITHUB_ENV"

      - name: Prepare provisioning profile and notarization key
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.REPOPROMPT_CE_PROVISIONING_PROFILE_BASE64 }}
          NOTARYTOOL_PRIVATE_KEY_BASE64: ${{ secrets.NOTARYTOOL_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          umask 077
          SECRETS_DIR="$RUNNER_TEMP/repoprompt-tip-secrets"
          mkdir -p "$SECRETS_DIR"
          printf '%s' "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$SECRETS_DIR/repoprompt-ce.provisionprofile"
          printf '%s' "$NOTARYTOOL_PRIVATE_KEY_BASE64" | base64 --decode > "$SECRETS_DIR/notarytool-private-key.p8"
          echo "REPOPROMPT_PROVISIONING_PROFILE=$SECRETS_DIR/repoprompt-ce.provisionprofile" >> "$GITHUB_ENV"
          echo "NOTARYTOOL_PRIVATE_KEY=$SECRETS_DIR/notarytool-private-key.p8" >> "$GITHUB_ENV"

      - name: Install Sentry CLI for Tip symbol upload
        run: |
          set -euo pipefail
          if ! command -v sentry-cli >/dev/null 2>&1; then
            brew install getsentry/tools/sentry-cli
          fi

      - name: Prepare Tip Sentry auth token file
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          umask 077
          [[ -n "${SENTRY_AUTH_TOKEN:-}" ]] || { echo "SENTRY_AUTH_TOKEN is not configured" >&2; exit 1; }
          mkdir -p "$RUNNER_TEMP/repoprompt-tip-secrets"
          SENTRY_TOKEN_FILE="$RUNNER_TEMP/repoprompt-tip-secrets/sentry-auth-token"
          printf '%s' "$SENTRY_AUTH_TOKEN" > "$SENTRY_TOKEN_FILE"
          chmod 600 "$SENTRY_TOKEN_FILE"

      - name: Sign and notarize staged tip
        env:
          TIP_COMMIT: ${{ needs.setup.outputs.commit }}
          TIP_SHORT_SHA: ${{ needs.setup.outputs.short-sha }}
          TIP_BUILD_NUMBER: ${{ needs.setup.outputs.build-number }}
          TIP_TAG: ${{ needs.setup.outputs.tag }}
          TIP_UPDATE_REPOSITORY: ${{ vars.TIP_UPDATE_REPOSITORY || 'repoprompt/repoprompt-ce-tip-updates' }}
          RELEASE_COMMIT: ${{ needs.setup.outputs.commit }}
          REPOPROMPT_CONTROL_PLANE_SCRIPTS_DIR: ${{ github.workspace }}/trusted-control-plane/Scripts
          REPOPROMPT_RELEASE_SOURCE_ROOT: ${{ github.workspace }}/tip-source
          REPOPROMPT_APPROVED_SOURCE_ROOT: ${{ github.workspace }}/approved-source
          REPOPROMPT_RELEASE_BUILD_NUMBER_OVERRIDE: ${{ needs.setup.outputs.build-number }}
          REPOPROMPT_ENABLE_SENTRY: "1"
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          REPOPROMPT_SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          REPOPROMPT_SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          REPOPROMPT_SENTRY_AUTH_TOKEN_FILE: ${{ runner.temp }}/repoprompt-tip-secrets/sentry-auth-token
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          NOTARYTOOL_KEY_ID: ${{ secrets.NOTARYTOOL_KEY_ID }}
          NOTARYTOOL_ISSUER_ID: ${{ secrets.NOTARYTOOL_ISSUER_ID }}
        run: ./trusted-control-plane/Scripts/main_tip_release.sh sign

      - name: Remove ephemeral keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/repoprompt-tip.keychain-db" || true
          rm -rf "$RUNNER_TEMP/repoprompt-tip-secrets"
          rm -f "$RUNNER_TEMP/repoprompt-tip.p12"

      - name: Upload signed tip assets for smoke and publish
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: RepoPrompt-CE-signed-tip
          path: |
            tip-source/dist/*.zip
            tip-source/dist/*.dmg
            tip-source/dist/appcast.xml
            tip-source/dist/SHA256SUMS
            tip-source/dist/*-artifact-manifest.json
            tip-source/dist/*-metadata.json
          if-no-files-found: error
          retention-days: 1

  smoke-no-secrets:
    name: Smoke Tip Without Release Secrets
    needs:
      - setup
      - sign
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - name: Check out trusted tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.setup.outputs.tooling-commit }}
          path: trusted-control-plane
          fetch-depth: 1
          persist-credentials: false

      - name: Download signed tip assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: RepoPrompt-CE-signed-tip
          path: signed-tip

      - name: Verify and smoke signed tip
        env:
          REPOPROMPT_PACKAGED_SMOKE_TIMEOUT: "240"
          REPOPROMPT_PACKAGED_SMOKE_HELPER_TIMEOUT: "60"
        run: |
          set -euo pipefail
          shopt -s nullglob
          archives=(signed-tip/*.zip)
          manifests=(signed-tip/*-artifact-manifest.json)
          [[ "${#archives[@]}" == "1" ]] || { echo "Expected one signed tip ZIP" >&2; exit 1; }
          [[ "${#manifests[@]}" == "1" ]] || { echo "Expected one signed tip manifest" >&2; exit 1; }
          mkdir extracted
          ditto -x -k "${archives[0]}" extracted
          env -i \
            PATH=/usr/bin:/bin:/usr/sbin:/sbin \
            HOME="$HOME" \
            TMPDIR="$RUNNER_TEMP" \
            USER="$USER" \
            LOGNAME="$LOGNAME" \
            REPOPROMPT_PACKAGED_SMOKE_TIMEOUT="$REPOPROMPT_PACKAGED_SMOKE_TIMEOUT" \
            REPOPROMPT_PACKAGED_SMOKE_HELPER_TIMEOUT="$REPOPROMPT_PACKAGED_SMOKE_HELPER_TIMEOUT" \
            ./trusted-control-plane/Scripts/smoke_packaged_mcp_roundtrip.sh \
            "extracted/RepoPrompt CE.app" \
            "Tip packaged app" \
            "${manifests[0]}"

  publish:
    name: Publish Tip Appcast
    needs:
      - setup
      - smoke-no-secrets
    environment: tip-release
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - name: Check out trusted tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.setup.outputs.tooling-commit }}
          path: trusted-control-plane
          fetch-depth: 1
          persist-credentials: false

      - name: Download signed tip assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: RepoPrompt-CE-signed-tip
          path: tip-assets

      - name: Publish tip update release
        env:
          TIP_COMMIT: ${{ needs.setup.outputs.commit }}
          TIP_SHORT_SHA: ${{ needs.setup.outputs.short-sha }}
          TIP_BUILD_NUMBER: ${{ needs.setup.outputs.build-number }}
          TIP_TAG: ${{ needs.setup.outputs.tag }}
          TIP_UPDATE_REPOSITORY: ${{ vars.TIP_UPDATE_REPOSITORY || 'repoprompt/repoprompt-ce-tip-updates' }}
          TIP_GH_TOKEN: ${{ secrets.TIP_UPDATE_REPOSITORY_TOKEN }}
          REPOPROMPT_CONTROL_PLANE_SCRIPTS_DIR: ${{ github.workspace }}/trusted-control-plane/Scripts
          REPOPROMPT_RELEASE_SOURCE_ROOT: ${{ github.workspace }}/trusted-control-plane
          DIST_DIR: ${{ github.workspace }}/tip-assets
        run: ./trusted-control-plane/Scripts/main_tip_release.sh publish-tip
