name: Release Candidate

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  artifact:
    name: Package Ad-Hoc Candidate
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run release preflight
        run: ./Scripts/release.sh preflight

      - name: Package ad-hoc release candidate
        run: ./Scripts/release.sh artifact

      - name: Upload release-candidate artifact
        uses: actions/upload-artifact@v4
        with:
          name: RepoPrompt-CE-release-candidate
          path: dist/*
          if-no-files-found: error
