name: PR Gate

on:
  pull_request_target:
    types: [opened]

jobs:
  check-contributor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      APPROVED_CONTRIBUTORS: ${{ secrets.APPROVED_CONTRIBUTORS }}
    steps:
      - name: Check pull request author
        uses: actions/github-script@v7
        with:
          script: |
            const VALID_CAPABILITIES = new Set(['issue', 'pr']);
            const prAuthor = context.payload.pull_request.user.login;
            const defaultBranch = context.payload.repository.default_branch;

            if (prAuthor.endsWith('[bot]') || prAuthor === 'dependabot[bot]') {
              console.log(`Skipping bot: ${prAuthor}`);
              return;
            }

            async function getPermission(username) {
              try {
                const { data: permissionLevel } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  username,
                });
                return permissionLevel.permission;
              } catch {
                return null;
              }
            }

            function parseApprovedUsers(content) {
              const users = new Map();

              for (const rawLine of content.split('\n')) {
                const line = rawLine.trim();
                if (!line || line.startsWith('#')) continue;

                const parts = line.split(/\s+/);
                if (parts.length !== 2) {
                  console.log(`Skipping malformed line: ${rawLine}`);
                  continue;
                }

                const [username, capability] = parts;
                const normalizedCapability = capability.toLowerCase();
                if (!VALID_CAPABILITIES.has(normalizedCapability)) {
                  console.log(`Skipping line with invalid capability: ${rawLine}`);
                  continue;
                }

                users.set(username.toLowerCase(), normalizedCapability);
              }

              return users;
            }

            async function closePullRequest(message) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: message,
              });

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                state: 'closed',
              });
            }

            const permission = await getPermission(prAuthor);
            if (['admin', 'maintain', 'write'].includes(permission)) {
              console.log(`${prAuthor} is a collaborator with ${permission} access`);
              return;
            }

            const approvedContent = process.env.APPROVED_CONTRIBUTORS ?? '';
            if (!approvedContent.trim()) {
              throw new Error('APPROVED_CONTRIBUTORS repository secret is not configured');
            }
            const approvedUsers = parseApprovedUsers(approvedContent);
            const capability = approvedUsers.get(prAuthor.toLowerCase());

            if (capability === 'pr') {
              console.log(`${prAuthor} is approved for pull requests`);
              return;
            }

            const message = [
              'This pull request was auto-closed. Only approved contributors can open pull requests.',
              '',
              `See [CONTRIBUTING.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/${defaultBranch}/CONTRIBUTING.md) for the contribution gate.`,
            ].join('\n');

            await closePullRequest(message);
